# Stack de production — à déployer sur le serveur applicatif.
# Suppose un reverse-proxy en amont (Traefik/Caddy/Cloudflare Tunnel) qui termine TLS.

services:
  app:
    image: ${APP_IMAGE:-ghcr.io/geniemag/web:latest}
    restart: unless-stopped
    env_file: ./.env.prod
    volumes:
      - storage:/var/www/html/storage
      - bootstrap-cache:/var/www/html/bootstrap/cache
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gm

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./prod/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - storage:/var/www/html/storage:ro
      - bootstrap-cache:/var/www/html/bootstrap/cache:ro
    depends_on:
      - app
    networks:
      - gm
    # Monte le code de l'app pour que nginx serve /public (volumes partagés)
    # via un entrypoint qui copie /var/www/html du container app.
    # Alternative : build une image nginx qui contient public/ en statique.

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file: ./.env.prod
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-gm}
      MYSQL_USER: ${DB_USERNAME:-gm}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./prod/mysql-backups:/backups
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - gm

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - gm

volumes:
  storage:
  bootstrap-cache:
  mysql_data:
  redis_data:

networks:
  gm:
    driver: bridge
