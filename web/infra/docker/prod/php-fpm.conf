[www]
user = www-data
group = www-data
listen = 0.0.0.0:9000
listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children = 25
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 8
pm.max_requests = 1000

catch_workers_output = yes
decorate_workers_output = no
clear_env = no

; Pipe vers stdout du container
access.log = /dev/null
