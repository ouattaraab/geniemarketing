server_tokens off;
client_max_body_size 50m;

upstream php_backend {
    server app:9000;
}

# Redirection HTTP → HTTPS (le reverse-proxy en amont le fait aussi d'habitude)
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers "ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305";

    # Headers sécurité (OWASP)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    root /var/www/html/public;
    index index.php index.html;

    # Gzip
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Cache immuable pour les assets buildés (Vite met un hash dans le filename)
    location ~* ^/build/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Autres assets statiques
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|webp|avif|woff2|woff|svg)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php_backend;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Masquer fichiers sensibles
    location ~ /\.(ht|env|git) { deny all; }
    location ~ ^/(composer|package)\.(json|lock) { deny all; }
}
